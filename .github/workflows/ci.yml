name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src tests

      - name: Test
        run: python -m pytest

  package:
    name: Build package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke install wheel
        run: |
          python -m venv /tmp/agent-tracker-wheel-smoke
          /tmp/agent-tracker-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/agent-tracker-wheel-smoke/bin/python -c "import agent_tracker; print(agent_tracker.__version__)"
          /tmp/agent-tracker-wheel-smoke/bin/agent-tracker --help
          /tmp/agent-tracker-wheel-smoke/bin/agent-tracker print-agent-prompt --profile custom
